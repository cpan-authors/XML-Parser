name: testsuite

on:
  push:
    branches:
      - "*"
    tags-ignore:
      - "*"
  pull_request:

jobs:
  ubuntu:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        with:
          cpanfile: "cpanfile"
      - name: expat version
        run: pkg-config --modversion expat 2>/dev/null || true
      - name: Makefile.PL
        run: perl Makefile.PL
      - name: make test
        run: make test

  no-lwp:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        with:
          cpanfile: "cpanfile"
      - name: Remove LWP::UserAgent
        run: |
          sudo perl -MLWP::UserAgent -e'unlink $INC{"LWP/UserAgent.pm"}'
          ! perl -MLWP::UserAgent -e1
      - name: expat version
        run: pkg-config --modversion expat 2>/dev/null || true
      - name: Makefile.PL
        run: perl Makefile.PL
      - name: make test
        run: make test

  asan:
    needs: [ubuntu]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        with:
          cpanfile: "cpanfile"
      - name: Install libasan
        run: sudo apt-get update && sudo apt-get install -y libasan8
      - name: Build with AddressSanitizer
        run: |
          ASAN_LIB=$(gcc -print-file-name=libasan.so)
          perl Makefile.PL OPTIMIZE="-g -fsanitize=address -fno-omit-frame-pointer" \
            LDDLFLAGS="-shared -fsanitize=address"
          make
      - name: Run tests under ASan
        run: |
          ASAN_LIB=$(gcc -print-file-name=libasan.so)
          ASAN_OPTIONS="detect_leaks=0:halt_on_error=1" \
            LD_PRELOAD="$ASAN_LIB" \
            make test

  disttest:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        with:
          cpanfile: "cpanfile"
      - name: expat version
        run: pkg-config --modversion expat 2>/dev/null || true
      - name: Makefile.PL
        run: perl Makefile.PL
      - name: make disttest
        run: make disttest

  perl-versions:
    runs-on: ubuntu-latest
    needs: [ubuntu, disttest]
    name: List Perl versions
    outputs:
      perl-versions: ${{ steps.action.outputs.perl-versions }}
    steps:
      - id: action
        uses: perl-actions/perl-versions@v1
        with:
          since-perl: 5.8
          with-devel: true

  linux:
    name: "Perl ${{ matrix.perl-version }}"
    needs: [perl-versions]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson (needs.perl-versions.outputs.perl-versions) }}

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - uses: actions/checkout@v4
      - name: Install expat
        run: |
          apt-get update && apt-get install -y --no-install-recommends libexpat1-dev
      - name: expat version
        run: pkg-config --modversion expat 2>/dev/null || dpkg -s libexpat1-dev 2>/dev/null | grep Version || true
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        with:
          sudo: false
          cpanfile: "cpanfile"
      - run: perl Makefile.PL
      - run: make
      - run: make test

  BSDs:
    needs: [ubuntu, linux]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        os:
          - name: freebsd
            version: '14.2'
            pkginstall: pkg install -y expat p5-ExtUtils-MakeMaker

          - name: openbsd
            version: '7.6'
            pkginstall: pkg_add expat

          - name: netbsd
            version: '10.1'
            pkginstall: pkgin -y install perl expat || true

    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Test on ${{ matrix.os.name }}
        uses: cross-platform-actions/action@v0.32.0
        timeout-minutes: 15
        with:
          operating_system: ${{ matrix.os.name }}
          version: ${{ matrix.os.version }}
          shell: bash
          run: |
            sudo ${{ matrix.os.pkginstall }}
            pkg-config --modversion expat 2>/dev/null || true
            curl -L https://cpanmin.us | sudo perl - --notest --installdeps --with-configure .
            perl Makefile.PL
            make
            prove -wlvmb t

  fedora:
    needs: [ubuntu, linux]
    runs-on: ubuntu-latest

    container:
      image: fedora:43

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          dnf -y install perl expat-devel git make gcc patch
      - name: expat version
        run: pkg-config --modversion expat 2>/dev/null || rpm -q expat-devel || true
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        with:
          sudo: false
          cpanfile: "cpanfile"
      - name: Makefile.PL
        run: perl Makefile.PL
      - name: make
        run: make
      - name: make test
        run: make test

  macOS:
    needs: [ubuntu, linux]
    runs-on: macos-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    steps:
      - uses: actions/checkout@v4
      - name: Set up Perl
        run: brew install perl
      - name: expat version
        run: pkg-config --modversion expat 2>/dev/null || true
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        with:
          sudo: false
          cpanfile: "cpanfile"
      - run: perl Makefile.PL
      - run: make
      - run: make test

  windows:
    needs: [ubuntu, linux]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Perl
        run: |
          choco install strawberryperl
          echo @"
          C:\strawberry\c\bin
          C:\strawberry\perl\site\bin
          C:\strawberry\perl\bin
          "@ |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        with:
          sudo: false
          cpanfile: "cpanfile"
      - name: perl Makefile.PL
        run: perl Makefile.PL
      - name: make
        run: make
      - name: Run Tests
        run: make test

  downstream:
    needs: [ubuntu, no-lwp, asan, disttest, linux, BSDs, fedora, macOS, windows]
    runs-on: ubuntu-latest

    env:
      AUTOMATED_TESTING: 1

    steps:
      - uses: actions/checkout@v4
      - name: perl -V
        run: perl -V
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwww-perl libfile-sharedir-perl libfile-sharedir-install-perl libpath-tiny-perl libxml-perl
      - name: Install XML-Parser from checkout
        run: |
          perl Makefile.PL
          make
          sudo make install
      - name: Download downstream tarballs
        run: |
          mkdir -p /tmp/downstream
          cd /tmp/downstream
          curl -sL https://cpan.metacpan.org/authors/id/T/TJ/TJMATHER/XML-RegExp-0.04.tar.gz | tar xz
          curl -sL https://cpan.metacpan.org/authors/id/M/MA/MANWAR/XML-XPath-1.48.tar.gz | tar xz
          curl -sL https://cpan.metacpan.org/authors/id/T/TJ/TJMATHER/XML-DOM-1.46.tar.gz | tar xz
          curl -sL https://cpan.metacpan.org/authors/id/M/MI/MIROD/XML-Twig-3.54.tar.gz | tar xz
      - name: Install XML::RegExp (XML::DOM dep)
        run: |
          cd /tmp/downstream/XML-RegExp-0.04
          perl Makefile.PL
          make
          sudo make install
      - name: Test XML::XPath
        run: |
          cd /tmp/downstream/XML-XPath-1.48
          perl Makefile.PL
          make test
          sudo make install
      - name: Test XML::DOM
        env:
          PERL_USE_UNSAFE_INC: 1
        run: |
          cd /tmp/downstream/XML-DOM-1.46
          perl Makefile.PL
          make test
          sudo make install
      - name: Test XML::Twig
        run: |
          cd /tmp/downstream/XML-Twig-3.54
          perl Makefile.PL -y
          make test 2>&1 | tee /tmp/twig-test.log
          # XML::Twig 3.54 has 3 pre-existing failures in test_3_30.t (59-61)
          # unrelated to XML-Parser. Fail only on unexpected test failures.
          if grep -q 'Failed 1/.*test programs' /tmp/twig-test.log; then
            if grep -q 't/test_3_30.t' /tmp/twig-test.log && \
               grep -q 'Failed tests:  59-61' /tmp/twig-test.log && \
               grep -q 'Failed 1/' /tmp/twig-test.log; then
              echo "OK: only pre-existing XML::Twig 3.54 failures (test_3_30.t 59-61)"
            else
              echo "UNEXPECTED test failures in XML::Twig"
              exit 1
            fi
          fi
